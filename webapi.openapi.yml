  /devices/ws/{wsId}/status:
    parameters:
      - in: path
        name: wsId
        schema:
          type: string
        required: true
        description: The Webserver's id
      - in: query
        name: installation_id
        schema:
          type: string
        required: true
        description: The Installation's id to which the webserver belongs
      - in: query
        name: devices
        schema:
          type: string
        required: false
        description: if 1, returns all the ws devices. User must be admin.
        example: "1"
    get:
      security:
        - bearerAuth: []
      summary: >
        Request the webserver's status and config. User must belong to the installation. If devices query parameter is set to 1,
        then the devices will also be returned (user must be admin)
      tags:
        - Devices
      responses:
        "200":
          description: Successful. Returning webserver information
          content:
            application/json:
              schema:
                type: object
                description: webserver information
                properties:
                  ws_type:
                    $ref: "#/components/schemas/ws_type"
                  config:
                    $ref: "#/components/schemas/WebserverStatusObj"
                  status:
                    $ref: "#/components/schemas/WebserverConfigObj"
                  devices:
                    type: array
                    nullable: true
                    items:
                      type: object
                      properties:
                        device_id:
                          type: string
                          description: Id of the device
                          example: 5fa16a35fec9d36b122c7953
                        name:
                          nullable: true
                          type: string
                          description: Name set to the device (if it has)
                          example: Salón
                        device_type:
                          type: string
                          description: Type of the device
                          enum:
                            [
                              aidoo,
                              aidoo_it,
                              aidoo_acs,
                              az_zone,
                              az_system,
                              az_energy_clamp,
                              az_acs,
                              az_outputs,
                              az_vmc,
                              az_relay,
                              az_dehumidifier,
                            ]
                          example: az_zone
                        config:
                          type: object
                          nullable: true
                          description: additional configuration of the device
                          properties:
                            system_number:
