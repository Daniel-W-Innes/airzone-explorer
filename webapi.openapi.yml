      properties:
        fah:
          type: number
          description: Fahrenheit setpoint
          example: 68
        celsius:
          type: number
          description: Celsius setpoint
          example: 25
    step:
      type: object
      nullable: true
      description: >
        [R] Step configuration for the setpoint change.
      example:
        fah: 1
        celisus: 0.5
    usermode_conf:
      type: string
      nullable: true
      description: >
        [R/W] Active configuration for the user mode function. Available values:
          * 'stop': Stop user mode configuration.
          * 'comfort': Comfort user mode configuration
          * 'unoccupied': Unoccupied user mode configuration
          * 'night': Night user mode configuration
          * 'eco': Eco user mode configuration
          * 'vacation': Vacation user mode configuration
      example: "comfort"
      enum: [stop, comfort, unoccupied, night, eco, vacation]
    usermode_values:
      type: array
      description: >
        [R] Available configurations for user mode (VAF). Master only has available values. Available values:
          * 'stop': Stop user mode configuration.
          * 'comfort': Comfort user mode configuration
          * 'unoccupied': Unoccupied user mode configuration
          * 'night': Night user mode configuration
          * 'eco': Eco user mode configuration
          * 'vacation': Vacation user mode configuration
      example: [stop, comfort, unoccupied, night, eco, vacation]
      nullable: true
      items:
        $ref: "#/components/schemas/usermode_conf"
    aq_mode_conf:
      type: string
      description: >
        [R/W] Active configuration for the ionization function. (Note: Requires Air purification module)
          * off: Purifier disabled
          * on: Purifier active
          * auto: Purifier in auto mode
      example: "off"
      enum: ["off", "on", auto]
      nullable: true
    aq_mode_values:
      type: array
      description: >
        [R] Lists available ionizer configurations: Off: 'off', On: 'on', Automatic (depending on the air quality index): 'auto'. (Note: Requires Air purification module).
      example: ["off", "on", auto]
      nullable: true
      items:
        $ref: "#/components/schemas/aq_mode_conf"
    eco_conf:
      type: string
      description: >
        [R/W] Active configuration for eco function. Available values:
          * 'off': Eco configuration off
          * 'manual': Eco configuration set to manual mode: Master zone sets the setpoint limits
          * 'a': A energy-saving eco mode
          * 'a_p': A+ energy-saving eco mode
          * 'a_pp': A++ energy-saving eco mode
      example: "off"
      enum: ["off", manual, a, a_p, a_pp]
      nullable: true
    eco_values:
      type: array
      description: >
        [R] Available configurations for eco function. Master only has available values.
      example: ["off", manual, a, a_p, a_pp]
      nullable: true
      items:
        $ref: "#/components/schemas/eco_conf"
