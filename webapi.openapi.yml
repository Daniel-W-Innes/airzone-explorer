      type: object
      description: >
        [R/W] Timer configuration for turning off the zone. To activate it, write values correspond to the timer minutes (available values in timer_values): [0, 30, 60, 90]. 0 turns off the timer.
      properties:
        value:
          type: number
          description: target value of the timer in minutes
          example: 30
          enum: [0, 30, 60, 90]
        count:
          type: number
          description: seconds remaining to execute the action. Value in seconds. Only Aidoo reports this data
          nullable: true
          example: 300
        action:
          type: object
          description: Action to execute when time reaches target. If empty object, no target specified
          nullable: true
          properties:
            power:
              type: boolean
              description: Turns the zone on/off. For now only turning off is allowed
              example: false

      nullable: true
