          example: Casa
        access_type:
          $ref: "#/components/schemas/access-type"
    access-type:
      type: string
      description: Access type
      enum: [admin, advanced, basic]
    device-type:
      type: string
      description: >
        Device type. Possible values:
          * **az_zone**: Corresponds to an Airzone system climate control zone.
          * **az_system**: Corresponds to an Airzone system module. These govern multiple zones (related by their system_number). Can be used to make broadcast changes to all zones in a specific system.
          * **az_energy_clamp**: Airzone consumption meter.
          * **az_acs**: DHW control unit.
          * **az_ccp**: Airzone Production control board module. Used to configure DHW settings.
          * **az_outputs**: Outputs of an Airzone system module (az_system). For configuring the zone's outputs.
          * **az_vmc**: DCV unit.
          * **az_relay**: Relay unit.
          * **az_dehumidifier**: Dehumidifier module.
          * **aidoo**: Aidoo zone. Equivalent to an Airzone system zone (az_zone), but controlled by an Aidoo.
          * **aidoo_it**: Aidoo Pro zone.
          * **aidoo_acs**: Aidoo DHW control unit.
      enum:
        [
          az_zone,
          aidoo,
          az_system,
          az_energy_clamp,
          az_acs,
          az_ccp,
          az_outputs,
          az_vmc,
          az_relay,
          az_dehumidifier,
          aidoo,
          aidoo_it,
          aidoo_acs,
        ]
