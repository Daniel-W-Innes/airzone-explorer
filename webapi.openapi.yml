    AuxHeatStageConf:
      type: object
      description: >
        Describes the Auxiliary heat stage parameters. In order to edit the writable parameters, the PATCH request must add the
        "opts" property with the following entry: "stage": {{number of auxiliary heat stage}}. Also, the name of the writable parameters all have to prepend "aux_heat_stage_". For setpoint properties, the "opts.units" entry must also be set. Example:

        {
          "param": "aux_heat_stage_diff_conf",
          "value": 2,
          "opts": {
            "units": 0,
            "stage": 1
          }
        }

      properties:
        diff_conf:
          $ref: '#/components/schemas/SetpointObject'
          description: >
            [R/W] Configured differential for the stage.

        diff_values:
          type: array
          items:
            $ref: '#/components/schemas/SetpointObject'
          description: >
            [R] Possible differential values.

        hist_conf:
          $ref: '#/components/schemas/SetpointObject'
          description: >
            [R/W] Configured hysteresis for the stage.

        hist_values:
          type: array
          items:
            $ref: '#/components/schemas/SetpointObject'
          description: >
            [R] Possible hysteresis values.

        time_conf:
          $ref: '#/components/schemas/SetpointObject'
          description: >
            [R/W] Configured time for the stage.

        time_values:
          type: array
          items:
            type: number
          description: >
            [R] Possible time values.
    aux_heat_stages_conf:
      type: array
      items:
        $ref: '#/components/schemas/AuxHeatStageConf'
      nullable: true
      description: >
