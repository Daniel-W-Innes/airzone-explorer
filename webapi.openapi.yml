openapi: 3.0.2
info:
  title: Web API - Airzone Cloud
  description: >-
    # Airzone Cloud Web API interface.

    ## RESTful service for user-cloud communications.

    ### Introduction

    The following document describes the use of the Airzone Cloud Web API, hereafter referred to as the Web API. This includes the authentication flow, all available RESTful requests/actions, and the details of the newly introduced WebSocket interface.

    ### Authentication

    The authentication mechanism is based on [JSON Web Tokens (JWT)](https://en.wikipedia.org/wiki/JSON_Web_Token) exchange. Each login request issues a pair of tokens: `token` and `refresh_token`.

    The `token` must be used in every authenticated request, with the awareness that it can expire. In the event of expiration, a new pair can be requested using the corresponding `refresh_token`.

    ### WebSocket Interface

    In addition to the RESTful service, a WebSocket interface is now available, providing a real-time communication channel between clients and the Airzone Cloud. For documentation, example usage, and guidelines on how to integrate with the WebSocket interface, please refer to the [WebSocket API documentation](https://developers.airzonecloud.com/docs/websocket-api/).

    The WebSocket API complements our RESTful services by offering a persistent connection for scenarios where immediate data push and real-time updates are crucial.



  version: "1.0"
  contact:
    name: Airzone
    email: devapps@altracorporacion.es
servers:
  - url: "https://m.airzonecloud.com/api/v1"
    description: Production environment base URL

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: "Token generation endpoint"
      description: "It checks if the user is registered in the platform."
      requestBody:
        description: "Authentication using email"
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  description: "User email"
                  example: "example@email.com"
                  type: string
                  pattern: /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[A-Z0-9.-]+\.[A-Z]{2,}$/i
                password:
                  description: "Password"
                  example: "secretpassword1234"
                  type: string
                  minLength: 8
                  maxLength: 64
      responses:
        "200":
          description: User logged in and pair token/refreshToken created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/login-response'

        "400":
          description: >
            Error responses: *badParams*, *userNotExist*, *userNotConfirmed*.
              * *badParams*: input validation error.
              * *userNotExist*: email/password pair doesn't match any existing user
              * *userNotConfirmed*: user hasn't confirmed its account yet.
          content:
            application/json:
              examples:
                badParams:
                  $ref: '#/components/examples/badParams'
                userNotExist:
                  $ref: '#/components/examples/userNotExist'
                userNotConfirmed:
                  $ref: '#/components/examples/userNotConfirmed'
              schema:
                $ref: '#/components/schemas/error-response'

  /auth/refreshToken/{refreshToken}:
    get:
      tags:
        - Auth
      summary: "Token refresh endpoint"
      description: "It generates a new pair token/refreshtoken given a valid refreshtoken. Once refreshed, the old token/refreshToken are invalidated"
      parameters:
        - in: path
          name: refreshToken
          schema:
            type: string
          required: true
          description: "the user's valid refreshToken"

      responses:
        "200":
          description: Successfully created new pair token/refreshToken.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: "a new valid JWT"
                  refreshToken:
                    type: string
                    description: "a new valid refreshToken"

        "400":
          description: >
            Error responses: *badParams*, *userNotExist*:
              * *badParams*: invalid refresh token format.
              * *userNotExist*: user no longer exists.
          content:
            application/json:
              examples:
               badParams:
                  $ref: '#/components/examples/badParams'
              schema:
                $ref: '#/components/schemas/error-response'
        "403":
          description: >
            Error responses: *tokenNotFound*:
              * *tokenNotFound*: no credential records match the refreshToken specified in the request parameters.
          content:
            application/json:
              examples:
                tokenNotFound:
                  $ref: '#/components/examples/tokenNotFound'
              schema:
                $ref: '#/components/schemas/error-response'
        "500":
          description: >
            Error responses: *createJWT*:
              * *createJWT*: Internal error. Unable to create new token pair.
          content:
            application/json:
              examples:
                tokenNotFound:
                  $ref: '#/components/examples/createJWT'
              schema:
                $ref: '#/components/schemas/error-response'

  /installations:
    get:
      security:
        - bearerAuth: []
      tags:
        - Installations
      summary: Retrieves user's installations
      description: >-
        It returns the user's confirmed installations in a paged way.
        By default, it limits to 10 installations. Page and num elements can be set (num elements cannot be over 10)
        It allows filtering by the following fields:
          * name
          * mac
      parameters:
        - in: query
          name: filterParam
          schema:
            type: string
            enum:
              - mac
              - name
          required: false
          description: Filter to apply
        - in: query
          name: filterValue
          schema:
            type: string
          required: false
          description: Value of the filter. Necessary if filterParam is set
        - in: query
          name: items
          schema:
            type: number
          required: false
          description: Number of items to return. Max 10, minimum 1.
        - in: query
          name: page
          schema:
            type: number
          required: false
          description: Page to return of items.
      responses:
        "200":
          description: Successful Response. Returns the installations.
          content:
            application/json:
              # examples:

              schema:
                $ref: "#/components/schemas/get-installation-response"
        "400":
          description: >
            Error responses: *badParams*.
              * *badParams*: Error in input validation; Cases:
                * if page is < 0
                * if items is <=0 or > 10
                * if filterParam is not a valid filter
                * if filterParam is defined but no filterValue is present
          content:
            application/json:
              examples:
                badParams:
                  $ref: "#/components/examples/badParamsitems"
              schema:
                $ref: "#/components/schemas/error-response"

  /installations/{installationId}:
    parameters:
      - in: path
        name: installationId
        schema:
          type: string
        required: true
        description: The installation's id
    get:
      security:
        - bearerAuth: []
      summary: Returns the user's relation with the installation
      tags:
        - Installations
      responses:
        "200":
          description: Successful response. Returns the installation relation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/user-installations-record"
        "422":
          description: >
            Error responses: *userNotIncluded*.
              * *userNotIncluded*: happens when user making the request doesn't belong to the installation
    put:
      security:
        - bearerAuth: []
      summary: Execute an Installation action
      description: >
        Endpoint to execute a command to all the climate zones in an installation.
        Valid commands:
          * **speed**: number; Percentage of fan speed. number between 0 - 100, or 'auto' if auto.
          * **mode**: number; Device's mode. Mode must be included in the mode_available parameter of at least one device of the installation. Available modes:
            * **0**:  Stop
            * **1**:  Auto
            * **2**:  Cooling
            * **3**:  Heating
            * **4**:  Ventilation
            * **5**:  Dehumidifier/Dry mode
            * **6**:  Emergency Heat mode
            * **7**:  Heat air mode (only compatible systems)
            * **8**:  Heat radiant mode (only compatible systems)
            * **9**:  Heat combined mode (only compatible systems)
            * 1**0**:  Cooling air mode (only compatible systems)
            * 1**1**:  Cooling radiant mode (only compatible systems)
            * 1**2**:  Cooling combined mode (only compatible systems)
          * **setpoint**: number; applied to the actual mode. Additional 'opts' object must be set with the units:
            * **units**: number; 0 celsius; 1 fahrenheit
          * power: boolean; On/Off
          * timer: number; Timer configuration for turning off the zone. Timer value must be included in the timer_values parameter of at least one device of the installation.  Available values:
            * **0**: Timer off
            * **30**: 30 minutes
            * **60**: 60 minutes
            * **90**: 90 minutes
          * sleep: number; Sleep configuration. Sleep value must be included in the sleep_values parameter of at least one device of the installation. Available values:
            * **0**: Timer off
            * **30**: 30 minutes
            * **60**: 60 minutes
            * **90**: 90 minutes
          * eco_conf: string; Eco configuration. Configuration must be included in the eco_values parameter of at least one device of the installation. Available modes:
            * **'off'**: Eco configuration off
            * **'manual'**: Eco configuration set to manual mode: Master zone sets the setpoint limits
            * **'a'**: A energy-saving eco mode
            * **'a_p'**: A+ energy-saving eco mode
            * **'a_pp'**: A++ energy-saving eco mode
          * **usermode_conf**: string; User mode function. Usermode must be included in the usermode_values parameter of at least one device of the installation. Avaliable usermode_values:
            * **'stop'**: Stop user mode configuration
            * **'comfort'**: Comfort user mode configuration
            * **'unoccupied'**: Unoccupied user mode configuration
            * **'night'**: Night user mode configuration
            * **'eco'**: Eco user mode configuration
            * **'vacation'**: Vacation user mode configuration
          * **aq_mode_conf**: string; Configuration for the ionization function. Value must be included in the aq_mode_values parameter of at least one device of the installation. Available values:
            * **'off'**: Ionization deactivated
            * **'on'**: Ionization activated
            * **'auto'**: Automatic (depending on the air quality index)
          * **aq_vent_mode_conf**: string; Ventilation configuration for the AirQSensor's external fan. Value must be included in the aq_mode_values parameter of at least one device of the installation.  Available values:
            * **'off'**: Ionization deactivated
            * **'on'**: Ionization activated
            * **'auto'**: Automatic (depending on the air quality index)
      tags:
        - Installations
      requestBody:
        description: "Body params"
        content:
          application/json:
            examples:
              setpoint:
                $ref: "#/components/examples/postInstallationGroupSetpointChange"
              cool mode:
                $ref: "#/components/examples/postInstallationGroupModeChange"
            schema:
              $ref: "#/components/schemas/exec-group-installation-body-params"
      responses:
        "204":
          description: Successfully applied
        "403":
          description: >
            Error responses: *notAuthorized*.
              * *notAuthorized*: when the user hasn't yet confirmed its invitation to the installation
          content:
            application/json:
              examples:
                notAuthorized:
                  $ref: "#/components/examples/notAuthorized"
              schema:
                $ref: "#/components/schemas/error-response"
        "400":
          description: >
            Error responses: *badParams*, *commandNotSupported*.
              * *badParams*: Error in input validation;
              * *commandNotSupported*: if no devices in the installation allow configuring any of the parameters set
          content:
            application/json:
              examples:
                commandNotSupported:
                  $ref: "#/components/examples/commandNotSupported"
                badParams:
                  $ref: "#/components/examples/badParams"
              schema:
                $ref: "#/components/schemas/error-response"
        "422":
          description: >
            Error responses: *userNotIncluded*.
              * *userNotIncluded*: happens when user making the request doesn't belong to the installation or isn't allowed in the group
          content:
            application/json:
              examples:
                userNotIncluded:
                  $ref: "#/components/examples/userNotIncluded"
              schema:
                $ref: "#/components/schemas/error-response"

  /installations/{installationId}/group/{groupId}:
    parameters:
      - in: path
        name: installationId
        schema:
          type: string
        required: true
        description: The installationId
      - in: path
        name: groupId
        schema:
          type: string
        required: true
        description: The groupId
    put:
      security:
        - bearerAuth: []
      summary: Execute Group action
      description: >
        Endpoint to execute a command to all the devices in a group inside an installation.
        Valid commands:
          * **speed**: number; Percentage of fan speed. number between 0 - 100, or 'auto' if auto.
          * **mode**: number; Device's mode. Mode must be included in the mode_available parameter of at least one device of the installation. Available modes:
            * **0**:  Stop
            * **1**:  Auto
            * **2**:  Cooling
            * **3**:  Heating
            * **4**:  Ventilation
            * **5**:  Dehumidifier/Dry mode
            * **6**:  Emergency Heat mode
            * **7**:  Heat air mode (only compatible systems)
            * **8**:  Heat radiant mode (only compatible systems)
            * **9**:  Heat combined mode (only compatible systems)
            * 1**0**:  Cooling air mode (only compatible systems)
            * 1**1**:  Cooling radiant mode (only compatible systems)
            * 1**2**:  Cooling combined mode (only compatible systems)
          * **setpoint**: number; applied to the actual mode. Additional 'opts' object must be set with the units:
            * **units**: number; 0 celsius; 1 fahrenheit
          * power: boolean; On/Off
          * timer: number; Timer configuration for turning off the zone. Timer value must be included in the timer_values parameter of at least one device of the installation.  Available values:
            * **0**: Timer off
            * **30**: 30 minutes
            * **60**: 60 minutes
            * **90**: 90 minutes
          * sleep: number; Sleep configuration. Sleep value must be included in the sleep_values parameter of at least one device of the installation. Available values:
            * **0**: Timer off
            * **30**: 30 minutes
            * **60**: 60 minutes
            * **90**: 90 minutes
          * eco_conf: string; Eco configuration. Configuration must be included in the eco_values parameter of at least one device of the installation. Available modes:
            * **'off'**: Eco configuration off
            * **'manual'**: Eco configuration set to manual mode: Master zone sets the setpoint limits
            * **'a'**: A energy-saving eco mode
            * **'a_p'**: A+ energy-saving eco mode
            * **'a_pp'**: A++ energy-saving eco mode
          * **usermode_conf**: string; User mode function. Usermode must be included in the usermode_values parameter of at least one device of the installation. Avaliable usermode_values:
            * **'stop'**: Stop user mode configuration
            * **'comfort'**: Comfort user mode configuration
            * **'unoccupied'**: Unoccupied user mode configuration
            * **'night'**: Night user mode configuration
            * **'eco'**: Eco user mode configuration
            * **'vacation'**: Vacation user mode configuration
          * **aq_mode_conf**: string; Configuration for the ionization function. Value must be included in the aq_mode_values parameter of at least one device of the installation. Available values:
            * **'off'**: Ionization deactivated
            * **'on'**: Ionization activated
            * **'auto'**: Automatic (depending on the air quality index)
          * **aq_vent_mode_conf**: string; Ventilation configuration for the AirQSensor's external fan. Value must be included in the aq_mode_values parameter of at least one device of the installation.  Available values:
            * **'off'**: Ionization deactivated
            * **'on'**: Ionization activated
            * **'auto'**: Automatic (depending on the air quality index)
      tags:
        - Installations
      requestBody:
        description: "Body params"
        content:
          application/json:
            examples:
              setpoint:
                $ref: "#/components/examples/postInstallationGroupSetpointChange"
              cool mode:
                $ref: "#/components/examples/postInstallationGroupModeChange"
            schema:
              $ref: "#/components/schemas/exec-group-installation-body-params"
      responses:
        "204":
          description: Successfully applied
        "403":
          description: >
            Error responses: *notAuthorized*.
              * *notAuthorized*: when the user hasn't yet confirmed its invitation to the installation
          content:
            application/json:
              examples:
                notAuthorized:
                  $ref: "#/components/examples/notAuthorized"
              schema:
                $ref: "#/components/schemas/error-response"
        "400":
          description: >
            Error responses: *badParams*, *commandNotSupported*.
              * *badParams*: Error in input validation; if no valid params are sent, or they don't pass the validation
              * *commandNotSupported*: if no devices in the group allow configuring that parameter
          content:
            application/json:
              examples:
                commandNotSupported:
                  $ref: "#/components/examples/commandNotSupported"
                badParams:
                  $ref: "#/components/examples/badParams"
              schema:
                $ref: "#/components/schemas/error-response"
        "422":
          description: >
            Error responses: *userNotIncluded*.
              * *userNotIncluded*: happens when user making the request doesn't belong to the installation or isn't allowed in the group
          content:
            application/json:
              examples:
                userNotIncluded:
                  $ref: "#/components/examples/userNotIncluded"
              schema:
                $ref: "#/components/schemas/error-response"

  /installations/location/{locationId}:
    parameters:
      - in: path
        name: locationId
        schema:
          type: string
        required: true
        description: The locationId
    get:
      security:
        - bearerAuth: []
      summary: Returns the location information given the locationId
      description: >
        Returns the location information given the locationId.
      tags:
        - Installations
      responses:
        "200":
          description: Successful response. Returns the location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/location"
        "404":
          description: >
            Error responses: *locationNotFound*.
              * *locationNotFound*: no location found with that id
          content:
            application/json:
              examples:
                locationNotValid:
                  $ref: "#/components/examples/locationNotValid"
              schema:
                $ref: "#/components/schemas/error-response"

  /devices/{deviceId}:
    parameters:
      - in: path
        name: deviceId
        schema:
          type: string
        required: true
        description: The Device's id
    patch:
      security:
        - bearerAuth: []
      summary: Apply a change to a device's parameter
      description: Changes a device's parameter. If the parameter to set is of type advanced, user must be admin
      tags:
        - Devices
      requestBody:
        description: >

          Endpoint to update a device's parameter.

          Valid parameters depend by device type: the parameter must be present in it's status or configuration,
          and values must be included in the corresponding values array. See /devices/{deviceId}/config and /devices/{deviceId}/status for parameter information.
          Apart from those parameters, there are other utility parameters that can be set:
            * 'setpoint': changes a device's setpoint for it's actual operation mode
        content:
          application/json:
            schema:
              type: object
              required:
                - param
                - value
                - installation_id
              properties:
                param:
                  description: >
                    Parameter to update. Valid parameters depend by device type: the parameter must be present in it's status or configuration,
                    and values must be included in the corresponding values array. See /devices/{deviceId}/config and /devices/{deviceId}/status for parameter information.
                    Apart from those parameters, there are other utility parameters that can be set:
                      * 'setpoint': changes a device's setpoint for it's actual operation mode
                  example: "setpoint"
                  type: string
                value:
                  description: "Value of the parameter to set."
                  example: 24.5
                  oneOf:
                    - type: string
                    - type: number
                    - type: boolean
                installation_id:
                  description: "Installation_id of the device"
                  example: 5aa002e569702d0faea90000
                  type: string
                opts:
                  type: object
                  description: >
                    Optional parameters.
                    In setpoints, units parameter must be set
                  nullable: true
                  properties:
                    units:
                      type: number
                      description: Units of the setpoint set
                      example: 0
      responses:
        "204":
          description: Successful. Applied change.
        "400":
          description: >
            Error responses: *badParams*, *stageNotSupported*, *outOfRange*, *speedNotValid*, *commandNotSupportedMode*, *modeNotSupported*:
              * *badParams*: Error in input value
              * *stageNotSupported*: Error in trying to set a non valid stage
              * *outOfRange*: Error when trying to set a setpoint out of range
              * *speedNotValid*: Error when trying to set a non valid speed value
              * *commandNotSupportedMode*: Error when trying to set a command, but device is in a state that doesn't allow that change
              * *modeNotSupported*: Error when trying to set an invalid mode
          content:
            application/json:
              examples:
                badParams:
                  $ref: "#/components/examples/badParams"
                stageNotSupported:
                  $ref: "#/components/examples/stageNotSupported"
                outOfRange:
                  $ref: "#/components/examples/outOfRange"
                speedNotValid:
                  $ref: "#/components/examples/speedNotValid"
                commandNotSupportedMode:
                  $ref: "#/components/examples/commandNotSupportedMode"
                modeNotSupported:
                  $ref: "#/components/examples/modeNotSupported"
              schema:
                $ref: "#/components/schemas/error-response"
        "403":
          description: >
            Error responses: *notAuthorized*.
              * *notAuthorized*: when user is not admin of the installation and parameter to set is adv_conf
          content:
            application/json:
              examples:
                notAuthorized:
                  $ref: "#/components/examples/notAuthorized"
              schema:
                $ref: "#/components/schemas/error-response"
        "422":
          description: >
            Error responses: *userNotIncluded*, *deviceNotFound*, *deviceNotConnected*.
              * *userNotIncluded*: happens when user making the request doesn't belong to the installation
              * *deviceNotFound*: happens when the device Id doesn't refer to any device in the user's installation
              * *deviceNotConnected*: when the webserver is not online
          content:
            application/json:
              examples:
                userNotIncluded:
                  $ref: "#/components/examples/userNotIncluded"
                deviceNotFound:
                  $ref: "#/components/examples/deviceNotFound"
                deviceNotConnected:
                  $ref: "#/components/examples/deviceNotConnected"
              schema:
                $ref: "#/components/schemas/error-response"

  /devices/{deviceId}/config:
    parameters:
      - in: path
        name: deviceId
        schema:
          type: string
        required: true
        description: The Device's id
      - in: query
        name: installation_id
        schema:
          type: string
        required: true
        description: The Installation's id to which the device belongs
      - in: query
        name: type
        schema:
          type: string
          enum:
            - all
            - user
            - advanced
        required: true
        description: >
          type of configuration. If type === all, returns all config;
          If type === user, returns user config;
          If type === advanced; returns advanced config.
          In order to ask for advanced or all config, user must be admin
    get:
      security:
        - bearerAuth: []
      summary: Get the device's configuration
      tags:
        - Devices
      responses:
        "200":
          description: Successful. Returning zone configuration
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AidooDevice_AdvConf_Obj"
                  - $ref: "#/components/schemas/AidooDevice_UserConf_Obj"
                  - $ref: "#/components/schemas/AidooITDevice_AdvConf_Obj"
                  - $ref: "#/components/schemas/AidooITDevice_UserConf_Obj"
                  - $ref: "#/components/schemas/AidooACS_AdvConf_Obj"
                  - $ref: "#/components/schemas/AidooVMCDevice_AdvConf_Obj"
                  - $ref: "#/components/schemas/AZDevice_AdvConf_Obj"
                  - $ref: "#/components/schemas/AZDevice_UserConf_Obj"
                  - $ref: "#/components/schemas/AZSystem_AdvConf_Obj"
                  - $ref: "#/components/schemas/AZEnergyClamp_AdvConf_Obj"
                  - $ref: "#/components/schemas/AZCCP_AdvConf_Obj"
