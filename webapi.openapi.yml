  /devices/{deviceId}/status:
    parameters:
      - in: path
        name: deviceId
        schema:
          type: string
        required: true
        description: The Device's id
      - in: query
        name: installation_id
        schema:
          type: string
        required: true
        description: The Installation's id to which the device belongs
    get:
      security:
        - bearerAuth: []
      summary: Get the device's state
      tags:
        - Devices
      responses:
        "200":
          description: Successful. Returning device's state
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AidooDevice_StatusConf_Obj"
                  - $ref: "#/components/schemas/AidooITDevice_Status_Obj"
                  - $ref: "#/components/schemas/AZDevice_Status_Obj"
                  - $ref: "#/components/schemas/AZSystem_Status_Obj"
