    warning-error-element:
      type: object
      description: error or warning element.
      properties:
        _id:
          type: string
          description: error/warning id
          example: window
          enum:
            - 'presence'
            - 'window'
            - 'antifreeze'
            - 'temp_probe_cc'
            - 'temp_probe_oc'
            - 'thermostat_missing'
            - 'valve_missing'
            - 'probe_low_batt'
            - 'valve_low_batt'
            - 'valve_NTC_alarm'
            - 'cool_batt_probe_oc'
            - 'cool_batt_probe_cc'
            - 'heat_batt_probe_oc'
            - 'heat_batt_probe_cc'
            - 'dehumidifier_active'
            - 'dew_active'
            - 'dew_protection_active'
            - 'heat_supply_active'
            - 'acs_production_active'
            - 'ion_comm_error_sensor'
            - 'aq_sensor_error_comm'
            - 'fancoil_preparing'
            - 'fallback_cloud_active'
            - 'fallback_th_active'
            - 'gw_mode_active'
            - 'lockout_mode_active'
            - 'sensorError'
            - 'global_vent_active'
            - 'max_humidity_exceeded'
            - 'output_missing'
            - 'trv_mainboard_missing'
            - 'ccp_configuration_error'
            - 'ccp_comm_error'
            - 'aerothermal_comm_error'
            - 'aerothermal_fancoil_comm_error'
            - 'altherma_mainboard_comm_error'
            - 'altherma_iu_comm_error'
            - 'ec_comm_error'
            - 'ec_measurement_error'
            - 'h2_error'
            - 'machineready_error'
            - 'ac_unit_error'
            - 'valves_mainboard_comm_error'
            - 'ion_comm_error_b'
            - 'ion_comm_error_sensor'
            - 'ion_comm_error_ionizer'
            - 'ion_comm_error_motor_config'
            - 'bridge_alarm'
            - 'dehumidifier_module_missing'
            - 'relay_mainboard_missing'
            - 'relay_mainboard_probe_cc'
            - 'relay_mainboard_probe_oc'
            - 'conf_warning'
            - 'acs_active'
            - 'dirty_filter'
        data:
          type: object
          description: additional information of the error
    warning:
      type: array
      description: >
        [R] Array of warning messages with associated data.
          * 'presence' - presence warning
          * 'window' - window open warning
          * 'antifreeze' - antifreeze active
          * 'temp_probe_cc' - short circuit of the temperature probe
          * 'temp_probe_oc' - open circuit of the temperature probe
          * 'thermostat_missing' - thermostat unreachable
          * 'valve_missing' - Missing valves. This warning includes the following data property: 'valves' -> string array with the affected valve ids
          * 'probe_low_batt' - low battery in Lite thermostat
          * 'valve_low_batt' - low battery in valve.  This warning includes the following data property: 'valves' -> string array with the affected valve ids
          * 'valve_NTC_alarm' - NTC error in valve.  This warning includes the following data property: 'valves' -> string array with the affected valve ids
          * 'cool_batt_probe_oc' - open circuit in battery probe for cooling mode
          * 'cool_batt_probe_cc' - short circuit in battery probe for cooling mode
          * 'heat_batt_probe_oc' - open circuit in battery probe for heating mode
          * 'heat_batt_probe_cc' - short circuit in battery probe for heating mode
          * 'dehumidifier_active' - dehumidifier configuration active
          * 'dew_active' - dew alarm
          * 'dew_protection_active' - dew protection active
          * 'heat_supply_active' - heat supply configuration active
          * 'acs_production_active' - DHW active
          * 'ion_comm_error_sensor' - error in air quality sensor
          * 'aq_sensor_error_comm': Error connecting to the AirQSensor
          * 'fancoil_preparing' - Fancoil in preparing state.
          * 'fallback_cloud_active' - Device control blocked through the cloud because the third party thermostat is offline (integration done through cloud); only available locally.
          * 'fallback_th_active' - Device control blocked through the cloud because the third party thermostat is offline (integration done locally); only available locally.
          * 'gw_mode_active' - Device control blocked. Control is being done by Modbus master
          * 'lockout_mode_active' - Lockout mode active for emergency heat in Aidoo.
          * 'global_vent_active' - Global ventilation activated
          * 'max_humidity_exceeded' - Max humidity levels exceeded
          * 'output_missing' - Zone without outputs configured
      example: [{ _id: "window" }]
      nullable: true
      items:
        $ref: "#/components/schemas/warning-error-element"
    errors:
      type: array
      description: >
        [R] Array of error messages with associated data. Possible errors:
          * 'trv_mainboard_missing' - Communication error between system main board and radiant elements module
          * 'ccp_configuration_error' - CCP configuration error
          * 'ccp_comm_error' - CCP communication error
          * 'aerothermal_comm_error' - Aerothermal module communication error
          * 'altherma_mainboard_comm_error' - Aerothermal mainboard error
          * 'altherma_iu_comm_error' - Communication error Altherma Gateway - indoor unit
          * 'ec_comm_error' - Energy meter communication error
          * 'ec_measurement_error' - Energy meter measurement error
          * 'h2_error' - H2 error detected, damper delay enabled
          * 'machineready_error' - A/C unit not connected
          * 'ac_unit_error' - AC unit error. This error includes the following data property: 'error_code' -> string; machine unit error code
          * 'valves_mainboard_comm_error' - Error of comunication: Wireless valve control module - Main control board
          * 'ion_comm_error_b' - Communication lost between central unit and its rear side
          * 'ion_comm_error_sensor' - Loss of communication between the particle sensor and the main control board
          * 'ion_comm_error_ionizer' - Zone module with ionization not connected
          * 'ion_comm_error_motor_config' - Motor connected directly without Ioniser
          * 'bridge_alarm' - Mainboard Bridge alarm active
          * 'dehumidifier_module_missing' -  Error 18: Dehumidifier Module - Main Control Unit Communication error
          * 'relay_mainboard_missing' - This error includes the following data property: 'ids' -> string array with the affected relay board ids
          * 'relay_mainboard_probe_cc' - This error includes the following data property: 'ids' -> string array with the affected relay board ids
          * 'relay_mainboard_probe_oc' - This error includes the following data property: 'ids' -> string array with the affected relay board ids
      example: [{ _id: "trv_mainboard_missing" }]
      nullable: true
      items:
        $ref: "#/components/schemas/warning-error-element"
