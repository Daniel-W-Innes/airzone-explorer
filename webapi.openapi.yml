          type: string
          example: "2000-11-22T00:00:00.000Z"
          description: Date in ISO 8601 format of the last time the webserver connected to the cloud
        disconnection_date:
          type: string
          example: "2000-11-22T00:00:00.000Z"
          description: Date in ISO 8601 format of the last time the webserver disconnected from the cloud
    ws-config:
      type: object
      description: Webserver's configuration
      properties:
        mac:
          type: string
          description: Webserver's MAC address. It will match the webserver's _id field
          example: "AA:BB:CC:DD:EE:FF"
        pin:
          type: number
          example: 1234
          description: Webserver's pin value
        ws_fw:
          type: string
          description: Webserver's firmware version
          example: "3.23"
          nullable: true
        units:
          type: number
          description: webserver internal comm units (0 -> Celsius; 1 -> Fah)
          example: 0
          enum: [0, 1]
        country_code:
          type: string
          description: Country code of the webserver's location
          example: "ES"
          nullable: true
        stat_ap_mac:
          type: string
          description: If webserver is not cable, the mac address of the router conencted to
          example: "AA:BB:CC:DD:EE:FF"
          nullable: true
        stat_ssid:
          $ref: "#/components/schemas/stat_ssid"
        stat_channel:
          type: number
          description: If webserver is not cable, the wifi channel it is connected to
          example: 10
          nullable: true
    get-installation-schedules-response:
      description: Succesful Response. Returns installation's schedules.
      type: array
      items:
        $ref: "#/components/schemas/installation-schedule"
    installation-schedule-post:
      description: Schema for creating a new schedule.
      type: object
      properties:
        schedule:
          $ref: "#/components/schemas/installation-schedule-post-body"
        opts:
          type: object
          description: additional schedule properties. For now only used to identify the setpoint units (celsius/fah)
          properties:
            units:
              type: number
              description: Must be set if the schedule contains a setpoint change. 0 -> celsius; 1 -> fahrenheit
              enum:
                - 1
                - 0
    installation-schedule-post-body:
      type: object
      description: >
        Installation schedule creation schema. It allows to create five types of schedules:
          * Weekly schedules. Weekly defined schedules. Only applicable to the following device types:
            * az_zone
            * aidoo
            * aidoo_it
             Also, the parameter `ws_sched_available` must be true to allow weekly schedules (for az_zones, this parameter will be present in its corresponding system (az_system device with the same system_number))
          * Calendar schedules. Calendar based defined schedules. Only applicable to the following device types:
            * az_zone
            Also, the parameter `ws_sched_calendar_available` must be true to allow calendar schedules (for az_zones, this parameter will be present in its corresponding system (az_system device with the same system_number))
          * DHW schedules. Same as weekly schedules, but only for DHW device types:
            * az_acs
            * aidoo_acs
            The parameter `acs_sched_available` must be true in the device to allow DHW schedules.
          * DCV schedules. Same as weekly schedules, but only for DCV device types:
            * az_vmc
            The parameter `vmc_sched_available` must be true in the device to allow DVC schedules.
          * Relay schedules. Same as weekly schedules, but only for Relay device types:
            * az_relay
            The parameter `relay_sched_available` must be true in the device to allow Relay schedules.
      properties:
        prog_enabled:
          type: boolean
          description: If schedule is active or not.
          example: true
        name:
          type: string
          description: name of the schedule.
          pattern: "^.{0,11}$"
          example: Prog 1
        type:
          type: string
          description: >
            Type of the schedule:
              - 'week': weekly schedule. Need to set days, hour and minutes
              - 'calendar': Calendar schedule. Need to set start_month, end_month, start_day and end_day
              - 'acs': DHW schedule. Only for az_acs and aidoo_acs device types. Same configuration as weekly schedules.
              - 'vmc': DCV schedule. Only for az_vmc device type. Same configuration as weekly schedules.
              - 'relay': Relay schedule. Only for az_relay device type. Same configuration as weekly schedules.
          enum:
            - week
            - calendar
            - acs
            - vmc
            - relay
          example: week

        device_ids:
          type: array
          description: array of device_ids affected by the schedule.
          example: [5dd28d9e46aea00329682371, 5dd28d9e46aea00329682372]
          items:
            type: integer
        start_conf:
          description: Schedule settings
          type: object
          properties:
            days:
              type: array
              description: array of days on which it is active. values from 0 to 6 => 0 is Monday; 6 Sunday. Required in 'week', 'acs', 'vmc' and 'relay' schedules.
              example: [1, 3, 4]
              items:
                type: integer
                minimum: 0
                maximum: 6
            hour:
              type: number
              description: Start time (24h format) -> from 0 - 23.  Required in 'week', 'acs', 'vmc' and 'relay' schedules.
              minimum: 0
              maximum: 23
              nullable: true
              example: 16
            minutes:
              type: number
              description: start minutes -> from 0 - 59. Required in 'week', 'acs', 'vmc' and 'relay' schedules.
              minimum: 0
              maximum: 59
              nullable: true
              example: 32
            start_month:
              type: number
              description: start month (0 - 11). Required in 'calendar' schedules.
              minimum: 0
              maximum: 11
              nullable: true
              example: 2
            end_month:
              type: number
              description: end month (0 - 11). Required in 'calendar' schedules.
              minimum: 0
              maximum: 11
              nullable: true
              example: 3
            start_day:
              type: number
              description: start day of month (1 - 31, depending on the month). Required in 'calendar' schedules.
              minimum: 1
              maximum: 31
              nullable: true
              example: 5
            end_day:
              type: number
              description: ending day of month (1 - 31, depending on the month). Required in 'calendar' schedules.
              minimum: 1
              maximum: 31
              nullable: true
              example: 6
            power:
              type: boolean
              nullable: true
              description: Turn on/off a zone / DHW unit. Available for all schedule types
              example: false
            mode:
              type: number
              nullable: true
              description: Configure operation mode. Available for 'week' and 'calendar' schedule types. Value must be included in the  `mode_available` array parameter of the devices
              example: 3
            speed:
              type: number
              nullable: true
              description: Fan speed configuration. Only available for 'week' and 'calendar' schedule types. Value must be included in the  `speed_values` array parameter of the devices
              example: 3
            pspeed:
              type: number
              nullable: true
              description: >
                Alternative way of setting the fan speed configuration: sets the percentage between 0-100. This will map internally to a specific fan speed. Useful when zones have different num,ber of fan speeds.  Only available for 'week' and 'calendar' schedule types.  `speed_values` array parameter must be present in the devices, and have at least two available speeds.
              example: 3
            setpoint:
              type: number
              nullable: true
              description: >
                Value of the setpoint in the specified units. Available for all schedule types. If set, opts body must be inculded with "units" parameter.
                  * For 'acs' schedule types, the setpoint value must be between the most restrictive 'range_sp_acs_min' and 'range_sp_acs_max' range of all the devices.
                  * For 'calendar' and 'week' schedule types, the 'mode' parameter should also be set. The setpoint value must be between the most restrictive range of the mode set (see setpoint ranges for each mode).
            VMC_relay_mode_conf:
              type: string
              nullable: true
              description: relay configuration value. Only Available for 'week' schedule types. The value must be included in the `VMC_relay_mode_values` array parameter of the device
              enum:
                - "manual_off"
                - "manual_on"
              example: "manual_on"
            aq_mode_conf:
              type: string
              nullable: true
              description: ionizer configuration value. Only Available for 'week' schedule types and devices with ionizing capabilities. The value must be included in the `aq_mode_values` array parameter of the devices
              enum:
                - "off"
                - "on"
                - "auto"
              example: "auto"
            aq_vent_conf:
              type: string
              nullable: true
              description: Ventilation configuration value for the AirQ Sensor. Only Available for 'week' schedule types and devices with AirQ sensor. The value must be included in the `aq_vent_mode_values` array parameter of the devices
              enum:
                - "off"
                - "on"
                - "auto"
              example: "auto"
    installation-schedule:
      type: object
      description: Installation Schedule Schema
      properties:
        _id:
          type: string
          description: id of the schedule
          example: 5dd28d9e46aea00329682371
        prog_enabled:
          type: boolean
          description: If schedule is active or not.
          example: true
        name:
          type: string
          description: name of the schedule.
          pattern: "^.{0,11}$"
          example: Prog 1
        type:
          type: string
          description: >
            Type of the schedule. 3 types:
              - week: weekly schedules.
              - calendar: Calendar schedules.
              - acs: DHW calendar.
          enum:
            - week
            - calendar
            - acs
          example: week

        device_ids:
          type: array
          description: array of device_ids affected by the schedule.
          example: [5dd28d9e46aea00329682371, 5dd28d9e46aea00329682372]
          items:
            type: integer
        start_conf:
          description: Programming start setting value
          type: object
          properties:
            days:
              type: array
              description: array of days on which it is active. values from 0 to 6 => 0 is Monday; 6 Sunday. Present in 'week' and 'acs' schedules
              example: [1, 3, 4]
              items:
                type: integer
                minimum: 0
                maximum: 6
            hour:
              type: number
              description: Start time -> from 0 - 23. Present in 'week' and 'acs' schedules
              minimum: 0
              maximum: 23
              nullable: true
              example: 16
            minutes:
              type: number
              description: start minutes -> from 0 - 59. Present in 'week' and 'acs' schedules
              minimum: 0
              maximum: 59
              nullable: true
              example: 32
            start_month:
              type: number
              description: start month (0 - 11). Present in 'calendar' schedules
              minimum: 0
              maximum: 11
              nullable: true
              example: 2
            end_month:
              type: number
              description: end month (0 - 11). Present in 'calendar' schedules
              minimum: 0
              maximum: 11
              nullable: true
              example: 3
            start_day:
              type: number
              description: start day of month (1 - 31, depending on the month). Present in 'calendar' schedules
              minimum: 1
              maximum: 31
              nullable: true
              example: 5
            end_day:
              type: number
              description: ending day of month (1 - 31, depending on the month). Present in 'calendar' schedules
              minimum: 1
              maximum: 31
              nullable: true
              example: 6
            power:
              type: boolean
              nullable: true
              description: Device state (on/off)
              example: false
            mode:
              type: number
              nullable: true
              description: Device operation mode
              example: 3
            speed:
              type: number
              nullable: true
              description: Device speed configuration
              example: 3
            setpoint:
              $ref: "#/components/schemas/SetpointObject"
            VMC_relay_mode_conf:
              type: string
              nullable: true
              description: relay configuration value. Only Available for 'week' schedule types.
              enum:
                - "manual_off"
                - "manual_on"
              example: "manual_on"
            aq_mode_conf:
              type: string
              nullable: true
              description: ionizer configuration value. Only Available for 'week' schedule types
              enum:
                - "off"
                - "on"
                - "auto"
              example: "auto"
            aq_vent_conf:
              type: string
              nullable: true
              description: Ventilation configuration value for the AirQ Sensor. Only Available for 'week' schedule types and devices with AirQ sensor. The value must be included in the `aq_vent_mode_values` array parameter of the devices
              enum:
                - "off"
                - "on"
                - "auto"
              example: "auto"
