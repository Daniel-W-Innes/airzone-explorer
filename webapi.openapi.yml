                  $ref: "#/components/examples/badParams"
              schema:
                $ref: "#/components/schemas/error-response"
        "403":
          description: >
            Error responses: *notAuthorized*.
              * *notAuthorized*: if devices === 1 and user is not admin of the installation
          content:
            application/json:
              examples:
                notAuthorized:
                  $ref: "#/components/examples/notAuthorized"
              schema:
                $ref: "#/components/schemas/error-response"
        "422":
          description: >
            Error responses: *deviceNotFound*, *userNotIncluded*.
              * *deviceNotFound*: happens when the ws Id doesnt refer to any ws in the user's installation
              * *userNotIncluded*: when the user doesnt belong to the installation
          content:
            application/json:
              examples:
                deviceNotFound:
                  $ref: "#/components/examples/deviceNotFound"
                userNotIncluded:
                  $ref: "#/components/examples/userNotIncluded"
              schema:
                $ref: "#/components/schemas/error-response"

  /user/:
    get:
      tags:
        - User
      summary: "Returns the user's data"
      description: "Returns the users model data"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/user-data-response"

        "400":
          description: >
            Error response:  *userNotExist*
              * *userNotExist*: happens when user making the request doesn't exist
          content:
            application/json:
              examples:
                userNotExist:
                  $ref: "#/components/examples/userNotExist"
              schema:
                $ref: "#/components/schemas/error-response"

  /user/logout:
    get:
      tags:
        - User
      summary: "User logout endpoint"
      description: "It invalidates the user's token/refreshToken pair used in the request"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User logged out correctly.
        '401':
          $ref: '#/components/responses/UnauthorizedError'

tags:
  - name: Auth
    description: Unauthorized requests for user authentication.
  - name: User
    description: Requests used for retreiving the user's data
  - name: Installations
    description: Installation management endpoints.
  - name: Devices
    description: Devices management endpoints. Endpoints for retreiving devices' state and configuration and setting parameters

